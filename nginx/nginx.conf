upstream django {
    server app:8000;
} 

# Redirecionar HTTP para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name teste.virtualstables.com.br virtualstables.com.br www.virtualstables.com.br;

    # Localização para certificado Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirecionar todo o resto para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Configuração HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name teste.virtualstables.com.br virtualstables.com.br www.virtualstables.com.br;

    client_max_body_size 100M;

    # Certificados SSL (serão configurados depois)
    ssl_certificate /etc/letsencrypt/live/teste.virtualstables.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teste.virtualstables.com.br/privkey.pem;

    # Configurações SSL modernas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # HSTS (opcional, mas recomendado)
    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts aumentados
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
    }

    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
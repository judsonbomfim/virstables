services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_data:/app/static
      - media_data:/app/media
    depends_on:
      - app
    restart: always
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - static_data:/app/static
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_USER: ${DB_USER}
      DB_PORT: ${DB_PORT:-5432}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    expose:
      - "8000"
    networks:
      - app-network
    command: >
      sh -c "
        while ! pg_isready -h \"$DB_HOST\" -p \"$DB_PORT\" -d postgres; do
          echo 'Aguardando PostgreSQL...'
          sleep 2
        done
        echo 'PostgreSQL pronto!'
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn core.wsgi:application --bind 0.0.0.0:8000
      "
  
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p ${DB_PORT:-5432} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DB_HOST: ${DB_HOST:-postgres}
      DB_USER: ${DB_USER}
      DB_PORT: ${DB_PORT:-5432}
    restart: always
    networks:
      - app-network
    depends_on:
      - redis
      - postgres
      - app
    command: >
      sh -c "
        while ! pg_isready -h \"$DB_HOST\" -p \"$DB_PORT\" -d postgres; do
          echo 'Aguardando PostgreSQL para Celery...'
          sleep 2
        done
        echo 'PostgreSQL pronto para Celery!'
        celery -A core worker --loglevel=info
      "

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DB_HOST: ${DB_HOST:-postgres}
      DB_USER: ${DB_USER}
      DB_PORT: ${DB_PORT:-5432}
    restart: always
    networks:
      - app-network
    depends_on:
      - redis
      - postgres
      - app
    command: >
      sh -c "
        while ! pg_isready -h \"$DB_HOST\" -p \"$DB_PORT\" -d postgres; do
          echo 'Aguardando PostgreSQL para Celery Beat...'
          sleep 2
        done
        echo 'PostgreSQL pronto para Celery Beat!'
        celery -A core beat --loglevel=info
      "

volumes:
  static_data:
  media_data:
  postgres_data:

networks:
  app-network:
    driver: bridge
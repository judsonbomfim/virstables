services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_data:/app/static
      - media_data:/app/media
    depends_on:
      - app
    restart: always
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./static:/app/static
      - ./media:/app/media
    env_file:
      - .env
    depends_on:
      - postgres
    restart: always
    expose:
      - "8000"
    networks:
      - app-network
    command: >
      sh -c "
        echo 'Aguardando PostgreSQL...'
        sleep 10
        python manage.py migrate
        python manage.py collectstatic --noinput
        gunicorn core.wsgi:application --bind 0.0.0.0:8000
      "
  
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    networks:
      - app-network

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: always
    networks:
      - app-network
    depends_on:
      - redis
      - postgres
      - app
    command: celery -A core worker --loglevel=info

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: always
    networks:
      - app-network
    depends_on:
      - redis
      - postgres
      - app
    command: celery -A core beat --loglevel=info

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
services:
  postgres:
    image: postgres:17
    container_name: virstables-postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - virstables-network

  redis:
    image: redis:7
    container_name: virstables-redis
    restart: always
    networks:
      - virstables-network

  app:
    build: .
    container_name: virstables-app
    restart: always
    env_file:
      - .env
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
      - ./config:/app/config:ro
    depends_on:
      - postgres
      - redis
    networks:
      - virstables-network

  celery:
    build: .
    container_name: virstables-celery
    restart: always
    command: celery -A core worker -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    networks:
      - virstables-network

  celery-beat:
    build: .
    container_name: virstables-celery-beat
    restart: always
    command: celery -A core beat -l info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    volumes:
      - .:/app
      - celerybeat_data:/tmp
    depends_on:
      - postgres
      - redis
    networks:
      - virstables-network

  nginx:
    image: nginx:latest
    container_name: virstables-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - virstables-network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  celerybeat_data:
  redis_data:

networks:
  virstables-network:
    driver: bridge
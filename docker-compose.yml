version: '3.8'

services:
  web:
    build: .
    entrypoint: ./entrypoint.sh
    volumes:
      - app_code:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - migration

  migration:
    build: .
    command: python manage.py migrate --noinput
    volumes:
      - app_code:/app
    env_file:
      - .env

  celery_worker:
    build: .
    command: celery -A core worker -l info
    volumes:
      - app_code:/app
    env_file:
      - .env
    depends_on:
      - web

volumes:
  app_code:
  static_volume:
  media_volume: 
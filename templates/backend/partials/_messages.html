{% if messages %}
  {% for message in messages %}
    <div class="toast-container position-fixed top-0 end-0 p-3 toast-index toast-rtl">
      <div class="toast" id="liveToast6" role="alert" aria-live="polite" aria-atomic="true">
        <div class="d-flex justify-content-between align-items-center alert-light-{{ message.tags }}">
          <div class="toast-body d-flex align-items-center">
            <i class="close-search stroke-{{ message.tags }}" data-feather="check-square"></i> {{ message }}
          </div>
          <button class="btn-close" type="button" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3 toast-index toast-rtl">
      <div class="toast" id="liveToast6" role="alert" aria-live="polite" aria-atomic="true" data-bs-autohide="true" data-bs-delay="5000">
        <div class="toast-header bg-{{ message.tags }} text-white">
          <strong class="me-auto">Notificação</strong>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body d-flex align-items-center">
          <i class="close-search stroke-{{ message.tags }}" data-feather="check-square" style="margin-right: 8px;"></i>
          <span class="text-{{ message.tags }}">{{ message }}</span>
        </div>
      </div>
    </div>
  {% endfor %}
{% endif %}

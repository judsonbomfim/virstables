{% extends 'frontend/base.html' %}

{% load static %}

{% block extra_css %}
<style>
    .loginscreen.middle-box {
        width: 500px;
        margin: 10% auto;
        padding: 20px;
    }
    .ibox-content {
        background-color: #ffffff;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    .success-icon {
        font-size: 64px;
        color: #1ab394;
        margin-bottom: 20px;
    }
    .btn-primary {
        background-color: #1ab394;
        border-color: #1ab394;
        height: 50px;
        font-size: 16px;
    }
    .m-t-lg { margin-top: 30px !important; }
</style>
{% endblock %}

{% block content %}
<div class="middle-box text-center loginscreen animated fadeInDown">
    <div class="ibox">
        <div class="ibox-content">
            <div class="success-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h2 class="font-bold">SENHA REDEFINIDA!</h2>
            <p class="m-t-lg">
                Sua senha foi alterada com sucesso.
            </p>
            <p>
                Agora você já pode fazer login com sua nova senha.
            </p>
            <a href="{% url 'users_frontend:login' %}" class="btn btn-primary block full-width m-t-lg">
                Fazer Login
            </a>
        </div>
    </div>
</div>
{% endblock %}

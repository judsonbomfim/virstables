{% extends 'backend/shared/base.html' %}
{% load static %}

{% block content %}
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">
          <div class="card-header">
            <h5 class="mb-0">Lista de Clientes</h5>
          </div>
          <div class="card-body">
            <table class="table table-striped">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nome</th>
                  <th>Email</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
                {% for cliente in clientes %}
                  <tr>
                    <td>{{ cliente.id }}</td>
                    <td>{{ cliente.usuario.get_full_name|default:cliente.usuario.username }}</td>
                    <td>{{ cliente.usuario.email }}</td>
                    <td>
                      <a href="{% url 'users_backend:cliente_detalhe' cliente.id %}" class="btn btn-sm btn-primary">Ver</a>
                      <a href="{% url 'users_backend:cliente_editar' cliente.id %}" class="btn btn-sm btn-secondary">Editar</a>
                    </td>
                  </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% extends 'backend/shared/base.html' %}
{% load static %}

{% block content %}
  <div class="row">
    <div class="col-lg-8 offset-lg-2">
      <div class="card">
        <div class="card-header border-l-primary border-3 d-flex justify-content-between align-items-center">
          <h5 class="card-title mb-0">{{ post.titulo }}</h5>
          <a href="{% url 'blog_backend:post_editar' post.pk %}" class="btn btn-warning btn-sm">
            <i class="fa fa-edit"></i> Editar
          </a>
        </div>
        <div class="card-body">
          {% if post.imagem %}
            <img src="{{ post.imagem.url }}" class="img-fluid rounded mb-3" alt="{{ post.titulo }}">
          {% endif %}
          <p><strong>Publicado:</strong> {% if post.published %}Sim{% else %}Não{% endif %}</p>
          <p><strong>Atualizado em:</strong> {{ post.updated_at|date:"d/m/Y H:i" }}</p>
          <hr>
          <div>
            {{ post.conteudo|safe }}
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
